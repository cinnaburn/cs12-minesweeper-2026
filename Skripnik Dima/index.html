<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сапер</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="window">
        <div class="header">
            <div class="lcd" id="mines-counter" aria-label="Mines remaining: 010">010</div>
            <a href="" class="smiley-btn" id="smiley-btn" aria-label="New game">🙂</a>
            <div class="lcd" id="timer" aria-label="Time elapsed: 000">000</div>
        </div>
        <div class="board-container">
            <div class="board" id="board" role="grid" aria-label="Minesweeper board">
                <button class="cell mine" type="button" aria-label="Row 1, Column 1: mine"><span>💣</span></button>
                <button class="cell" type="button" aria-label="Row 1, Column 2: 1 adjacent mine"><span class="val-1">1</span></button>
                <button class="cell" type="button" aria-label="Row 1, Column 3: empty"><span></span></button>
                <button class="cell" type="button" aria-label="Row 1, Column 4: empty"><span></span></button>
                <button class="cell" type="button" aria-label="Row 1, Column 5: empty"><span></span></button>

                <button class="cell" type="button" aria-label="Row 1, Column 8: 1 adjacent mine"><span class="val-1">1</span></button>
                <button class="cell mine" type="button" aria-label="Row 1, Column 9: mine"><span>💣</span></button>

                <button class="cell" type="button" aria-label="Row 2, Column 1: 1 adjacent mine"><span class="val-1">1</span></button>

                <button class="cell" type="button" aria-label="Row 2, Column 4: empty"><span></span></button>
                <button class="cell" type="button" aria-label="Row 2, Column 5: empty"><span></span></button>
                <button class="cell" type="button" aria-label="Row 2, Column 6: empty"><span></span></button>
                <button class="cell" type="button" aria-label="Row 2, Column 7: empty"><span></span></button>

                <button class="cell" type="button" aria-label="Row 2, Column 9: 1 adjacent mine"><span class="val-1">1</span></button>

                <button class="cell" type="button" aria-label="Row 3, Column 1: empty"><span></span></button>
                <button class="cell" type="button" aria-label="Row 3, Column 2: empty"><span></span></button>
                <button class="cell" type="button" aria-label="Row 3, Column 3: empty"><span></span></button>

                <button class="cell" type="button" aria-label="Row 4, Column 1: 1 adjacent mine"><span class="val-1">1</span></button>

                <button class="cell mine" type="button" aria-label="Row 9, Column 6: mine"><span>💣</span></button>
                <button class="cell" type="button" aria-label="Row 9, Column 7: 1 adjacent mine"><span class="val-1">1</span></button>
                <button class="cell" type="button" aria-label="Row 9, Column 8: empty"><span></span></button>
                <button class="cell" type="button" aria-label="Row 9, Column 9: empty"><span></span></button>
            </div>
        </div>
    </div>
</body>
</html>
