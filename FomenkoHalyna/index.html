<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minesweeper UI - Halyna Fomenko</title>
    <link rel="stylesheet" href="style.css">
    <style>
      .menu-bar-button {
        background: none;
        border: none;
        padding: 0;
        margin: 0 4px;
        font: inherit;
        cursor: pointer;
      }

      .menu-bar-button:focus-visible {
        outline: 2px solid #000000;
        outline-offset: 2px;
      }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="menu-bar" role="menubar">
            <button type="button" class="menu-bar-button" role="menuitem">Game</button>
            <button type="button" class="menu-bar-button" role="menuitem">Options</button>
            <button type="button" class="menu-bar-button" role="menuitem">Help</button>
        </div>

        <div class="game-box">
            <header class="status-panel">
                <div class="counter">010</div>
                <button class="reset-button" type="button" aria-label="Reset game">😊</button>
                <div class="counter">000</div>
            </header>

            <main class="game-grid">
                <button type="button" class="cell open n1">1</button>
                <button type="button" class="cell open n1">1</button>
                <button type="button" class="cell open"></button>
                <button type="button" class="cell open"></button>
                <button type="button" class="cell open"></button>
                <button type="button" class="cell open"></button>
                <button type="button" class="cell open"></button>
                <button type="button" class="cell open"></button>
                <button type="button" class="cell open"></button>
                <button type="button" class="cell open"></button>

                <button type="button" class="cell flag"></button>
                <button type="button" class="cell open n1">1</button>
                <button type="button" class="cell open"></button>
                <button type="button" class="cell open"></button>
                <button type="button" class="cell open"></button>
                <button type="button" class="cell open n1">1</button>
                <button type="button" class="cell open n1">1</button>
                <button type="button" class="cell open n1">1</button>
                <div class="cell open"></div>
                <div class="cell open"></div>

                <div class="cell open n1">1</div>
                <div class="cell open n1">1</div>
                <div class="cell open"></div>
                <div class="cell open"></div>
                <div class="cell open"></div>
                <div class="cell open n1">1</div>
                <div class="cell mine"></div>
                <div class="cell open n1">1</div>
                <div class="cell open"></div>
                <div class="cell open"></div>

                <div class="cell open"></div>
                <div class="cell open"></div>
                <div class="cell open n1">1</div>
                <div class="cell open n1">1</div>
                <div class="cell open n1">1</div>
                <div class="cell open n1">1</div>
                <div class="cell open n1">1</div>
                <div class="cell open n1">1</div>
                <div class="cell open"></div>
                <div class="cell open"></div>

                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell flag"></div>
                <div class="cell mine-exploded"></div>
                <div class="cell flag-wrong"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell open n2">2</div>
                <div class="cell open n1">1</div>
                <div class="cell open"></div>

                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            </main>
        </div>
    </div>

</body>
</html>
